<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel HaxBall</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .header { background: #16213e; padding: 20px; text-align: center; border-bottom: 2px solid #0f3460; }
        .header h1 { font-size: 24px; color: #e94560; }
        .header p { color: #888; font-size: 13px; margin-top: 5px; }
        .container { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        .sala-card { background: #16213e; border-radius: 10px; padding: 20px; margin-bottom: 15px; border: 1px solid #0f3460; }
        .sala-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .sala-name { font-size: 18px; font-weight: bold; }
        .status { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status.running { background: #00b894; color: #fff; }
        .status.stopped { background: #e17055; color: #fff; }
        .sala-info { display: flex; gap: 20px; margin-bottom: 15px; font-size: 13px; color: #aaa; }
        .sala-info span { display: flex; align-items: center; gap: 5px; }
        .token-input { display: flex; gap: 10px; margin-bottom: 15px; }
        .token-input input { flex: 1; padding: 10px; border: 1px solid #0f3460; border-radius: 6px; background: #1a1a2e; color: #eee; font-size: 14px; }
        .token-input input::placeholder { color: #555; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .btn:hover { transform: translateY(-1px); }
        .btn-start { background: #00b894; color: #fff; }
        .btn-start:hover { background: #00a884; }
        .btn-stop { background: #e17055; color: #fff; }
        .btn-stop:hover { background: #d15a45; }
        .btn-maintenance { background: #fdcb6e; color: #2d3436; }
        .btn-maintenance:hover { background: #f0c040; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .sala-link { margin-bottom: 15px; }
        .sala-link a { color: #74b9ff; text-decoration: none; font-size: 13px; }
        .sala-link a:hover { text-decoration: underline; }
        .logs { background: #0d0d1a; border-radius: 6px; padding: 12px; max-height: 250px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 12px; line-height: 1.6; }
        .logs .log-line { color: #aaa; word-break: break-all; }
        .logs .log-line.error { color: #e17055; }
        .logs-toggle { font-size: 12px; color: #74b9ff; cursor: pointer; margin-bottom: 8px; }
        .token-help { font-size: 12px; color: #888; margin-top: 8px; }
        .token-help a { color: #74b9ff; }
        .uptime { color: #00b894; }
        .backup-bar { background: #16213e; border-bottom: 1px solid #0f3460; padding: 10px 20px; display: flex; justify-content: flex-end; align-items: center; gap: 12px; font-size: 13px; color: #aaa; }
        .btn-backup { background: #0984e3; color: #fff; padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .btn-backup:hover { background: #0773c5; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Panel de Salas HaxBall</h1>
        <p>Controla tus salas desde aqui</p>
    </div>
    <div class="backup-bar">
        <span id="backup-status"></span>
        <button class="btn-backup" onclick="downloadBackup('players')">⬇️ Players</button>
        <button class="btn-backup" onclick="downloadBackup('clans')">⬇️ Clanes</button>
        <button class="btn-backup" onclick="downloadBackup('titan')">⬇️ Titan</button>
        <button class="btn-backup" onclick="downloadBackup('dailyRewards')">⬇️ Daily</button>
    </div>
    <div class="container" id="salas"></div>

    <script>
        let salasData = {};
        let logsVisible = {};

        function formatUptime(seconds) {
            if (!seconds) return '0s';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            if (h > 0) return h + 'h ' + m + 'm';
            if (m > 0) return m + 'm ' + s + 's';
            return s + 's';
        }

        function formatTime(ts) {
            const d = new Date(ts);
            return d.toLocaleTimeString();
        }

        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                salasData = await res.json();
                render();
            } catch(e) {}
        }

        async function fetchLogs(salaId) {
            try {
                const res = await fetch('/api/logs/' + salaId);
                const logs = await res.json();
                const logsDiv = document.getElementById('logs-' + salaId);
                if (logsDiv) {
                    logsDiv.innerHTML = logs.map(l =>
                        '<div class="log-line' + (l.text.includes('[ERROR]') ? ' error' : '') + '">' +
                        formatTime(l.time) + ' ' + escapeHtml(l.text) + '</div>'
                    ).join('');
                    logsDiv.scrollTop = logsDiv.scrollHeight;
                }
            } catch(e) {}
        }

        function escapeHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        async function startSala(salaId) {
            const input = document.getElementById('token-' + salaId);
            const token = input.value.trim();
            if (!token || !token.startsWith('thr1.')) {
                alert('Token invalido. Debe empezar con thr1.\nObtener en: haxball.com/headlesstoken');
                return;
            }
            const btn = document.getElementById('btn-start-' + salaId);
            btn.disabled = true;
            btn.textContent = 'Encendiendo...';
            try {
                await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ salaId, token })
                });
                logsVisible[salaId] = true;
            } catch(e) { alert('Error al encender'); }
            setTimeout(fetchStatus, 1000);
        }

        async function stopSala(salaId) {
            if (!confirm('Apagar sala?')) return;
            try {
                await fetch('/api/stop', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ salaId })
                });
            } catch(e) { alert('Error al apagar'); }
            setTimeout(fetchStatus, 1000);
        }

        async function maintenanceSala(salaId) {
            if (!confirm('Activar modo mantenimiento?\n\nSe kickearán todos los jugadores con aviso y luego se apagará la sala.')) return;
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '🔧 Kickeando...';
            try {
                const res = await fetch('/api/maintenance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ salaId })
                });
                const data = await res.json();
                if (data.ok) {
                    alert('✅ Mantenimiento completado. Ya puedes hacer git pull y reiniciar.');
                } else {
                    alert('❌ Error: ' + (data.error || 'Desconocido'));
                }
            } catch(e) { alert('Error: ' + e.message); }
            setTimeout(fetchStatus, 1000);
        }

        function toggleLogs(salaId) {
            logsVisible[salaId] = !logsVisible[salaId];
            render();
            if (logsVisible[salaId]) fetchLogs(salaId);
        }

        function render() {
            const container = document.getElementById('salas');
            let html = '';
            for (const id in salasData) {
                const s = salasData[id];
                const running = s.status === 'running';
                html += `
                <div class="sala-card">
                    <div class="sala-header">
                        <span class="sala-name">${escapeHtml(s.config.name)}</span>
                        <span class="status ${s.status}">${running ? 'ONLINE' : 'OFFLINE'}</span>
                    </div>
                    <div class="sala-info">
                        <span>Script: ${s.config.script}</span>
                        <span>Max: ${s.config.maxPlayers} jugadores</span>
                        ${running ? '<span class="uptime">Uptime: ' + formatUptime(s.uptime) + '</span>' : ''}
                    </div>
                    ${s.link ? '<div class="sala-link"><a href="' + s.link + '" target="_blank">' + s.link + '</a></div>' : ''}
                    ${!running ? `
                        <div class="token-input">
                            <input type="text" id="token-${id}" placeholder="Pega tu token aqui (thr1.xxx...)" />
                            <button class="btn btn-start" id="btn-start-${id}" onclick="startSala('${id}')">Encender</button>
                        </div>
                        <div class="token-help">Obtener token: <a href="https://www.haxball.com/headlesstoken" target="_blank">haxball.com/headlesstoken</a> (expira cada ~24h)</div>
                    ` : `
                        <button class="btn btn-maintenance" onclick="maintenanceSala('${id}')">🔧 Mantenimiento</button>
                        <button class="btn btn-stop" onclick="stopSala('${id}')">Apagar</button>
                    `}
                    <br>
                    <span class="logs-toggle" onclick="toggleLogs('${id}')">${logsVisible[id] ? 'Ocultar logs' : 'Ver logs'}</span>
                    ${logsVisible[id] ? '<div class="logs" id="logs-' + id + '">Cargando...</div>' : ''}
                </div>`;
            }
            container.innerHTML = html;
            // Cargar logs de salas visibles
            for (const id in salasData) {
                if (logsVisible[id]) fetchLogs(id);
            }
        }

        async function downloadBackup(collection) {
            const status = document.getElementById('backup-status');
            status.textContent = 'Generando ' + collection + '...';
            try {
                const res = await fetch('/api/backup/download/' + collection);
                if (!res.ok) { status.textContent = '❌ Error al generar backup'; return; }
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const date = new Date().toISOString().slice(0, 10);
                a.href = url;
                a.download = collection + '_' + date + '.json';
                a.click();
                URL.revokeObjectURL(url);
                status.textContent = '✅ ' + collection + ' descargado ' + new Date().toLocaleTimeString();
            } catch(e) {
                status.textContent = '❌ Error: ' + e.message;
            }
        }

        // Iniciar
        fetchStatus();
        setInterval(fetchStatus, 5000);
    </script>
</body>
</html>
